# Render Blueprint — деплой Django «Батарейки на переработку»
# https://render.com/docs/blueprint-spec

databases:
  - name: batdb
    plan: free
    databaseName: bat
    user: bat

services:
  - type: web
    plan: free
    name: bat
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn bat.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: batdb
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: WEB_CONCURRENCY
        value: "4"
