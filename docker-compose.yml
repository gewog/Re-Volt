services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
    environment:
      # Для продакшена: задайте DJANGO_SECRET_KEY и ALLOWED_HOSTS (ваш домен)
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-0.0.0.0,127.0.0.1,localhost}
      - DJANGO_DEBUG=0
      - DJANGO_DB_PATH=/app/data/db.sqlite3
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
    restart: unless-stopped

volumes:
  db_data:
